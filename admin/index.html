<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallpaper App Admin - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="CSS/style.css" />
    <script type="module">
      // Import Firebase
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

      // Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyDjffxaZJ7vmAlzA-LnN0Vhlh3EBJ4uRqE",
        authDomain: "wallpaper-incc.firebaseapp.com",
        projectId: "wallpaper-incc",
        storageBucket: "wallpaper-incc.appspot.com",
        messagingSenderId: "795698360511",
        appId: "1:795698360511:web:af7e54ac8e2f410a6ad60a",
        measurementId: "G-5LV2TEXN21",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // Set persistence for local login
      setPersistence(auth, browserLocalPersistence);

      window.onload = () => {
        const loginButton = document.getElementById("btn-login");
        loginButton.addEventListener("click", () => {
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value.trim();

          if (!email || !password) {
            alert("Please fill in both email and password.");
            return;
          }

          signInWithEmailAndPassword(auth, email, password)
            .then(() => {
              console.log("Login successful");
              window.location.href = "admin.html";
            })
            .catch((error) => {
              console.error("Error:", error.code, error.message);
              alert("Login failed: " + error.message);
            });
        });

        onAuthStateChanged(auth, (user) => {
          if (user) {
            window.location.href = "admin.html";
          }
        });
      };
    </script>
  </head>
  <body class="bg-dark d-flex align-items-center justify-content-center vh-100">
    <div id="login-card" class="card p-4" style="max-width: 400px; width: 100%;">
      <div class="card-body">
        <h1 class="h3 mb-3 text-center">Wallpaper App Admin</h1>
        <form>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="admin@example.com" />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" />
          </div>
          <div class="d-grid mt-4">
            <button id="btn-login" type="button" class="btn btn-primary">
              Login
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
