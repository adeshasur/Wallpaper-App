<!DOCTYPE html>
<html class="h-100">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallpaper App Admin - Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="CSS/style.css" />
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
      import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDjffxaZJ7vmAlzA-LnN0Vhlh3EBJ4uRqE",
        authDomain: "wallpaper-incc.firebaseapp.com",
        projectId: "wallpaper-incc",
        storageBucket: "wallpaper-incc.appspot.com",
        messagingSenderId: "795698360511",
        appId: "1:795698360511:web:af7e54ac8e2f410a6ad60a",
        measurementId: "G-5LV2TEXN21",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      onAuthStateChanged(auth, (user) => {
        if (!user) {
          window.location.href = "index.html";
        }
      });

      window.logout = () => {
        signOut(auth).then(() => {
          window.location.href = "index.html";
        });
      };
    </script>
  </head>
  <body class="h-100 bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="admin.html">Wallpaper.Inc Admin</a>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
      </div>
    </nav>
    <div class="container-fluid h-100">
      <div class="row h-100">
        <nav class="col-md-3 col-lg-2 d-md-block bg-secondary sidebar collapse p-3">
          <div class="position-sticky">
            <ul class="nav flex-column">
              <li class="nav-item mb-2">
                <a class="nav-link text-light font-weight-bold" href="admin.html">
                  Dashboard
                </a>
              </li>
              <li class="nav-item mb-2">
                <a class="nav-link text-light" href="views/categories.html">
                  Categories
                </a>
              </li>
            </ul>
          </div>
        </nav>
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">
          <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">Welcome, Admin!</h1>
          </div>
          <p>Select an option from the sidebar to manage Categories or Wallpapers.</p>
        </main>
      </div>
    </div>
  </body>
</html>
