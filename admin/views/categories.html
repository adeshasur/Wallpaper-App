<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallpaper App Admin - Categories</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <script
    src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous"
  ></script>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="../admin.html">Wallpaper.Inc Admin</a>
      <a class="btn btn-outline-light btn-sm" href="../admin.html">Back to Dashboard</a>
    </div>
  </nav>

  <div class="container mt-5">
    <h2>Manage Categories</h2>
    <hr />
    <div class="row">
      <div class="col-lg-5 mb-4">
        <div class="card p-4">
          <h4>Add New Category</h4>
          <form id="category-form">
            <div class="mb-3">
              <label for="category-name" class="form-label">Enter Name</label>
              <input type="text" class="form-control" id="category-name" required />
            </div>
            <div class="mb-3">
              <label for="category-desc" class="form-label">Description</label>
              <input type="text" class="form-control" id="category-desc" required />
            </div>
            <div class="mb-3">
              <label for="category-thumb" class="form-label">Thumbnail Image</label>
              <input type="file" class="form-control" id="category-thumb" accept="image/*" required />
            </div>
            <div class="mt-3">
              <button type="button" id="save-category" class="btn btn-primary w-100">
                Save Category
              </button>
            </div>
            <div class="progress mt-3" style="height: 20px;">
              <div id="upload-progress" class="progress-bar" style="width: 0%;">0%</div>
            </div>
            <div id="result" class="mt-3"></div>
          </form>
        </div>
      </div>
      <div class="col-lg-7">
        <div class="card p-4">
          <h4>Saved Categories</h4>
          <ul id="category-list" class="list-group mt-3"></ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Import JS/app.js as a module -->
  <script type="module" src="../JS/app.js"></script>
</body>
</html>
